<svg width="100%" viewBox="0 0 680 900" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Gf, Sdf, and Usd API reference with full library names</title>
<desc>Three stacked panels showing Usd (Universal Scene Description), Sdf (Scene Description Foundation), Gf (Graphics Foundational) and Vt (Value Types) with their key classes and methods grouped by category.</desc>

<style>
  :root { color-scheme: light dark; }
  svg { font-family: ui-monospace, 'SF Mono', 'Cascadia Code', 'Consolas', monospace; }

  .panel-usd  { fill: #EEEDFE; stroke: #534AB7; }
  .panel-sdf  { fill: #E1F5EE; stroke: #0F6E56; }
  .panel-gf   { fill: #F1EFE8; stroke: #5F5E5A; }

  .inner-usd  { fill: none; stroke: #AFA9EC; }
  .inner-sdf  { fill: none; stroke: #5DCAA5; }
  .inner-gf   { fill: none; stroke: #B4B2A9; }

  .label-usd-h  { fill: #3C3489; font-size: 14px; font-weight: 600; }
  .label-usd-s  { fill: #534AB7; font-size: 12px; }
  .label-usd-c  { fill: #534AB7; font-size: 11px; font-weight: 600; }
  .label-usd-t  { fill: #3C3489; font-size: 11px; }

  .label-sdf-h  { fill: #085041; font-size: 14px; font-weight: 600; }
  .label-sdf-s  { fill: #0F6E56; font-size: 12px; }
  .label-sdf-c  { fill: #0F6E56; font-size: 11px; font-weight: 600; }
  .label-sdf-t  { fill: #085041; font-size: 11px; }

  .label-gf-h   { fill: #444441; font-size: 14px; font-weight: 600; }
  .label-gf-s   { fill: #5F5E5A; font-size: 12px; }
  .label-gf-c   { fill: #5F5E5A; font-size: 11px; font-weight: 600; }
  .label-gf-t   { fill: #444441; font-size: 11px; }

  .arrow        { stroke: #888780; fill: none; }
  .arrow-label  { fill: #888780; font-size: 11px; }
  .footer-line  { stroke: #D3D1C7; }
  .footer-text  { fill: #888780; font-size: 11px; }

  @media (prefers-color-scheme: dark) {
    .panel-usd  { fill: #3C3489; stroke: #AFA9EC; }
    .panel-sdf  { fill: #085041; stroke: #5DCAA5; }
    .panel-gf   { fill: #444441; stroke: #B4B2A9; }
    .inner-usd  { fill: none; stroke: #7F77DD; }
    .inner-sdf  { fill: none; stroke: #1D9E75; }
    .inner-gf   { fill: none; stroke: #888780; }
    .label-usd-h { fill: #CECBF6; }
    .label-usd-s { fill: #AFA9EC; }
    .label-usd-c { fill: #CECBF6; }
    .label-usd-t { fill: #EEEDFE; }
    .label-sdf-h { fill: #9FE1CB; }
    .label-sdf-s { fill: #5DCAA5; }
    .label-sdf-c { fill: #9FE1CB; }
    .label-sdf-t { fill: #E1F5EE; }
    .label-gf-h  { fill: #D3D1C7; }
    .label-gf-s  { fill: #B4B2A9; }
    .label-gf-c  { fill: #D3D1C7; }
    .label-gf-t  { fill: #F1EFE8; }
    .arrow       { stroke: #888780; }
    .arrow-label { fill: #888780; }
    .footer-line { stroke: #5F5E5A; }
    .footer-text { fill: #888780; }
  }
</style>

<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- ══ Usd panel ══ -->
<rect x="40" y="20" width="600" height="248" rx="10" class="panel-usd" stroke-width="0.5"/>
<text x="60" y="46" dominant-baseline="central" class="label-usd-h">Usd</text>
<text x="110" y="46" dominant-baseline="central" class="label-usd-s">— Universal Scene Description</text>
<text x="60" y="64" dominant-baseline="central" class="label-usd-s">Composed scene — the final truth after all arcs resolve</text>

<rect x="56" y="78" width="174" height="174" rx="6" class="inner-usd" stroke-width="0.5"/>
<text x="143" y="94" text-anchor="middle" dominant-baseline="central" class="label-usd-c">Stage</text>
<text x="68" y="114" dominant-baseline="central" class="label-usd-t">Usd.Stage.Open()</text>
<text x="68" y="130" dominant-baseline="central" class="label-usd-t">Usd.Stage.CreateNew()</text>
<text x="68" y="146" dominant-baseline="central" class="label-usd-t">stage.Save()</text>
<text x="68" y="162" dominant-baseline="central" class="label-usd-t">stage.Export(path)</text>
<text x="68" y="178" dominant-baseline="central" class="label-usd-t">stage.Flatten()</text>
<text x="68" y="194" dominant-baseline="central" class="label-usd-t">stage.Traverse()</text>
<text x="68" y="210" dominant-baseline="central" class="label-usd-t">stage.GetLayerStack()</text>
<text x="68" y="226" dominant-baseline="central" class="label-usd-t">stage.MuteLayer()</text>
<text x="68" y="242" dominant-baseline="central" class="label-usd-t">stage.GetEditTarget()</text>

<rect x="246" y="78" width="174" height="174" rx="6" class="inner-usd" stroke-width="0.5"/>
<text x="333" y="94" text-anchor="middle" dominant-baseline="central" class="label-usd-c">Prim</text>
<text x="258" y="114" dominant-baseline="central" class="label-usd-t">stage.GetPrimAtPath()</text>
<text x="258" y="130" dominant-baseline="central" class="label-usd-t">stage.DefinePrim()</text>
<text x="258" y="146" dominant-baseline="central" class="label-usd-t">prim.IsA()</text>
<text x="258" y="162" dominant-baseline="central" class="label-usd-t">prim.HasAPI()</text>
<text x="258" y="178" dominant-baseline="central" class="label-usd-t">prim.GetChildren()</text>
<text x="258" y="194" dominant-baseline="central" class="label-usd-t">prim.GetPrimStack()</text>
<text x="258" y="210" dominant-baseline="central" class="label-usd-t">prim.GetRelationship()</text>
<text x="258" y="226" dominant-baseline="central" class="label-usd-t">prim.GetAttribute()</text>
<text x="258" y="242" dominant-baseline="central" class="label-usd-t">prim.GetTypeName()</text>

<rect x="436" y="78" width="188" height="174" rx="6" class="inner-usd" stroke-width="0.5"/>
<text x="530" y="94" text-anchor="middle" dominant-baseline="central" class="label-usd-c">Attribute + Relationship</text>
<text x="448" y="114" dominant-baseline="central" class="label-usd-t">attr.Get(timeCode)</text>
<text x="448" y="130" dominant-baseline="central" class="label-usd-t">attr.Set(value, time)</text>
<text x="448" y="146" dominant-baseline="central" class="label-usd-t">attr.GetTimeSamples()</text>
<text x="448" y="162" dominant-baseline="central" class="label-usd-t">attr.HasAuthoredValue()</text>
<text x="448" y="178" dominant-baseline="central" class="label-usd-t">attr.GetPropertyStack(tc)</text>
<text x="448" y="194" dominant-baseline="central" class="label-usd-t">rel.GetTargets()</text>
<text x="448" y="210" dominant-baseline="central" class="label-usd-t">rel.AddTarget(path)</text>
<text x="448" y="226" dominant-baseline="central" class="label-usd-t">prim.GetPrimIndex()</text>
<text x="448" y="242" dominant-baseline="central" class="label-usd-t">  .DumpToString()</text>

<line x1="340" y1="268" x2="340" y2="296" class="arrow" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="358" y="284" dominant-baseline="central" class="arrow-label">values are instances of</text>

<!-- ══ Sdf panel ══ -->
<rect x="40" y="304" width="600" height="248" rx="10" class="panel-sdf" stroke-width="0.5"/>
<text x="60" y="330" dominant-baseline="central" class="label-sdf-h">Sdf</text>
<text x="104" y="330" dominant-baseline="central" class="label-sdf-s">— Scene Description Foundation</text>
<text x="60" y="348" dominant-baseline="central" class="label-sdf-s">Raw layer data — one file's opinion, no composition</text>

<rect x="56" y="362" width="174" height="174" rx="6" class="inner-sdf" stroke-width="0.5"/>
<text x="143" y="378" text-anchor="middle" dominant-baseline="central" class="label-sdf-c">Layer</text>
<text x="68" y="398" dominant-baseline="central" class="label-sdf-t">Sdf.Layer.CreateNew()</text>
<text x="68" y="414" dominant-baseline="central" class="label-sdf-t">Sdf.Layer.FindOrOpen()</text>
<text x="68" y="430" dominant-baseline="central" class="label-sdf-t">layer.Save()</text>
<text x="68" y="446" dominant-baseline="central" class="label-sdf-t">layer.identifier</text>
<text x="68" y="462" dominant-baseline="central" class="label-sdf-t">layer.subLayerPaths</text>
<text x="68" y="478" dominant-baseline="central" class="label-sdf-t">layer.customLayerData</text>
<text x="68" y="494" dominant-baseline="central" class="label-sdf-t">layer.Clear()</text>
<text x="68" y="510" dominant-baseline="central" class="label-sdf-t">layer.GetAttributeAtPath()</text>
<text x="68" y="526" dominant-baseline="central" class="label-sdf-t">Sdf.ChangeBlock()</text>

<rect x="246" y="362" width="174" height="174" rx="6" class="inner-sdf" stroke-width="0.5"/>
<text x="333" y="378" text-anchor="middle" dominant-baseline="central" class="label-sdf-c">Spec</text>
<text x="258" y="398" dominant-baseline="central" class="label-sdf-t">Sdf.CreatePrimInLayer()</text>
<text x="258" y="414" dominant-baseline="central" class="label-sdf-t">Sdf.AttributeSpec()</text>
<text x="258" y="430" dominant-baseline="central" class="label-sdf-t">spec.specifier</text>
<text x="258" y="446" dominant-baseline="central" class="label-sdf-t">spec.typeName</text>
<text x="258" y="462" dominant-baseline="central" class="label-sdf-t">spec.default</text>
<text x="258" y="478" dominant-baseline="central" class="label-sdf-t">spec.GetInfo("timeSamples")</text>
<text x="258" y="494" dominant-baseline="central" class="label-sdf-t">spec.layer.identifier</text>
<text x="258" y="510" dominant-baseline="central" class="label-sdf-t">spec.documentation</text>
<text x="258" y="526" dominant-baseline="central" class="label-sdf-t">Sdf.ValueTypeNames.Float</text>

<rect x="436" y="362" width="188" height="174" rx="6" class="inner-sdf" stroke-width="0.5"/>
<text x="530" y="378" text-anchor="middle" dominant-baseline="central" class="label-sdf-c">Path</text>
<text x="448" y="398" dominant-baseline="central" class="label-sdf-t">Sdf.Path("/World/Chair")</text>
<text x="448" y="414" dominant-baseline="central" class="label-sdf-t">path.GetParentPath()</text>
<text x="448" y="430" dominant-baseline="central" class="label-sdf-t">path.AppendChild()</text>
<text x="448" y="446" dominant-baseline="central" class="label-sdf-t">path.IsPropertyPath()</text>
<text x="448" y="462" dominant-baseline="central" class="label-sdf-t">path.name</text>
<text x="448" y="478" dominant-baseline="central" class="label-sdf-t">Sdf.LayerOffset()</text>
<text x="448" y="494" dominant-baseline="central" class="label-sdf-t">Sdf.Reference()</text>
<text x="448" y="510" dominant-baseline="central" class="label-sdf-t">Sdf.SpecifierDef / Over</text>
<text x="448" y="526" dominant-baseline="central" class="label-sdf-t">layer.GetAttributeAtPath()</text>

<line x1="340" y1="552" x2="340" y2="580" class="arrow" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="358" y="568" dominant-baseline="central" class="arrow-label">values constructed with</text>

<!-- ══ Gf panel ══ -->
<rect x="40" y="588" width="600" height="220" rx="10" class="panel-gf" stroke-width="0.5"/>
<text x="60" y="614" dominant-baseline="central" class="label-gf-h">Gf</text>
<text x="94" y="614" dominant-baseline="central" class="label-gf-s">— Graphics Foundational</text>
<text x="388" y="614" dominant-baseline="central" class="label-gf-s">  Vt — Value Types (bulk arrays)</text>
<text x="60" y="632" dominant-baseline="central" class="label-gf-s">Math types only — no scene knowledge whatsoever</text>

<rect x="56" y="646" width="174" height="146" rx="6" class="inner-gf" stroke-width="0.5"/>
<text x="143" y="662" text-anchor="middle" dominant-baseline="central" class="label-gf-c">Vectors</text>
<text x="68" y="682" dominant-baseline="central" class="label-gf-t">Gf.Vec3f(x, y, z)</text>
<text x="68" y="698" dominant-baseline="central" class="label-gf-t">Gf.Vec3d(x, y, z)</text>
<text x="68" y="714" dominant-baseline="central" class="label-gf-t">Gf.Vec2f(u, v)</text>
<text x="68" y="730" dominant-baseline="central" class="label-gf-t">Gf.Vec4f(r, g, b, a)</text>
<text x="68" y="746" dominant-baseline="central" class="label-gf-t">Gf.Range3f(min, max)</text>
<text x="68" y="762" dominant-baseline="central" class="label-gf-t">Gf.BBox3d()</text>
<text x="68" y="778" dominant-baseline="central" class="label-gf-t">Gf.Interval()</text>

<rect x="246" y="646" width="174" height="146" rx="6" class="inner-gf" stroke-width="0.5"/>
<text x="333" y="662" text-anchor="middle" dominant-baseline="central" class="label-gf-c">Transforms</text>
<text x="258" y="682" dominant-baseline="central" class="label-gf-t">Gf.Matrix4d()</text>
<text x="258" y="698" dominant-baseline="central" class="label-gf-t">Gf.Matrix3d()</text>
<text x="258" y="714" dominant-baseline="central" class="label-gf-t">Gf.Quatf(w, x, y, z)</text>
<text x="258" y="730" dominant-baseline="central" class="label-gf-t">Gf.Rotation(axis, deg)</text>
<text x="258" y="746" dominant-baseline="central" class="label-gf-t">Gf.Transform()</text>
<text x="258" y="762" dominant-baseline="central" class="label-gf-t">matrix.GetInverse()</text>
<text x="258" y="778" dominant-baseline="central" class="label-gf-t">matrix.GetTranspose()</text>

<rect x="436" y="646" width="188" height="146" rx="6" class="inner-gf" stroke-width="0.5"/>
<text x="530" y="662" text-anchor="middle" dominant-baseline="central" class="label-gf-c">Vt arrays</text>
<text x="448" y="682" dominant-baseline="central" class="label-gf-t">Vt.Vec3fArray([...])</text>
<text x="448" y="698" dominant-baseline="central" class="label-gf-t">Vt.IntArray([...])</text>
<text x="448" y="714" dominant-baseline="central" class="label-gf-t">Vt.FloatArray([...])</text>
<text x="448" y="730" dominant-baseline="central" class="label-gf-t">Vt.Vec2fArray([...])</text>
<text x="448" y="746" dominant-baseline="central" class="label-gf-t">Vt.Matrix4dArray([...])</text>
<text x="448" y="762" dominant-baseline="central" class="label-gf-t">Vt.TokenArray([...])</text>
<text x="448" y="778" dominant-baseline="central" class="label-gf-t">Vt.StringArray([...])</text>

<!-- footer -->
<line x1="40" y1="824" x2="640" y2="824" class="footer-line" stroke-width="0.5"/>
<text x="340" y="844" text-anchor="middle" dominant-baseline="central" class="footer-text">Usd — composed truth     Sdf — raw layer opinions     Gf / Vt — math and array values</text>
<text x="340" y="864" text-anchor="middle" dominant-baseline="central" class="footer-text">attr.Get() returns a Gf type     spec.default holds a Gf type     Gf knows nothing about either</text>

</svg>
